packages:
  - apps/*
  - apps/desktop/renderer
  - packages/*

allowBuilds:
  '@biomejs/biome@1.9.4': true
  '@google/genai@1.52.0': false
  'better-sqlite3@12.11.1': true
  'esbuild@0.18.20': true
  'esbuild@0.25.12': true
  'esbuild@0.28.1': true
  'protobufjs@7.6.5': false
  'sharp@0.35.3': false

minimumReleaseAgeExclude:
  - '@earendil-works/pi-agent-core@0.80.9'
  - '@earendil-works/pi-ai@0.80.9'
  - '@earendil-works/pi-coding-agent@0.80.9'
  - '@earendil-works/pi-tui@0.80.9'

overrides:
  drizzle-orm: 0.45.2
  kysely: ^0.28.17
  fast-uri: 3.1.4
  sharp: 0.35.3
  defu: ^6.1.5
  shell-quote: ^1.8.4
  vite: ^6.4.2
  hono: ^4.12.25
  ws: ^8.21.0

# @hookform/resolvers declares zod as an OPTIONAL peer, so pnpm's isolated
# linker does not place a zod copy inside the resolver's own node_modules; its
# `zod/v3` + `zod/v4/core` type imports then resolve only via the fragile
# .pnpm/node_modules hoist, whose bare-name pick is non-deterministic across
# installs. On installs where it misses, the resolver types degrade to a
# fallback ($ZodType with _zod.version.minor 0) and every zodResolver() call
# site fails typecheck against the real zod@4.x schemas (TS2769). Injecting zod
# as a real dependency wires the SAME zod@4.4.3 instance into the resolver
# variant, making resolution deterministic on every OS/install.
packageExtensions:
  '@hookform/resolvers':
    dependencies:
      zod: ^4.4.3
