name: CI

on:
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.15.1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Build non-Tauri packages
        run: pnpm --filter '!@offisim/desktop' --filter '!@offisim/launcher' build

      - name: Typecheck
        run: pnpm typecheck

      - name: Test non-Tauri packages
        run: pnpm --filter '!@offisim/desktop' --filter '!@offisim/launcher' test

      - name: Provider policy check
        run: pnpm check:provider-policy
