# Minimal enforced gate set. The gate list is defined once in
# scripts/release-gates.mjs and shared with `pnpm release:run`.
name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gates:
    name: Types / harness / security gates
    runs-on: [self-hosted, macOS, ARM64]
    steps:
      - uses: actions/checkout@v5
      - uses: pnpm/action-setup@v6
      - uses: actions/setup-node@v5
        with:
          node-version: 24
      - run: pnpm install --frozen-lockfile
      - name: Release gates (node lane)
        run: node scripts/release-gates.mjs --lane=node

  rust:
    name: Desktop Rust tests
    runs-on: [self-hosted, macOS, ARM64]
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: 24
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/desktop/src-tauri
      # tauri-build resolves frontendDist at compile time; tests do not need
      # real renderer assets, only an existing dist directory.
      - name: Stub renderer dist
        run: |
          mkdir -p apps/desktop/renderer/dist
          echo '<!doctype html><title>ci-stub</title>' > apps/desktop/renderer/dist/index.html
      - name: Release gates (rust lane)
        run: node scripts/release-gates.mjs --lane=rust
