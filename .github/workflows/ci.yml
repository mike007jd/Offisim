# Minimal enforced gate set. The gate list is defined once in
# scripts/release-gates.mjs and shared with `pnpm release:run`.
name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  gates:
    name: Types / harness / security gates
    runs-on: ubuntu-24.04
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@b0f76dfb45f55f8421693e4803ac7bb65143bd34 # v6
        with:
          dest: ${{ runner.temp }}/setup-pnpm
          version: 11.13.1
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version-file: .nvmrc
          package-manager-cache: false
      - name: Release gates (node lane)
        run: |
          pnpm install --frozen-lockfile
          node scripts/release-gates.mjs --lane=node

  rust:
    name: Desktop Rust tests
    runs-on: macos-15
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@d23441a48e516b6c34aea4fa41551a30e30af803 # v6
        with:
          persist-credentials: false
      - uses: pnpm/action-setup@b0f76dfb45f55f8421693e4803ac7bb65143bd34 # v6
        with:
          version: 11.13.1
      - uses: actions/setup-node@249970729cb0ef3589644e2896645e5dc5ba9c38 # v6
        with:
          node-version-file: .nvmrc
          package-manager-cache: false
      - uses: dtolnay/rust-toolchain@4cda84d5c5c54efe2404f9d843567869ab1699d4 # stable
        with:
          toolchain: stable
      # tauri-build resolves frontendDist at compile time; tests do not need
      # real renderer assets, only an existing dist directory.
      - name: Stub renderer dist
        run: |
          mkdir -p apps/desktop/renderer/dist
          echo '<!doctype html><title>ci-stub</title>' > apps/desktop/renderer/dist/index.html
      - name: Release gates (rust lane)
        run: node scripts/release-gates.mjs --lane=rust
