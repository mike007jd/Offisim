<!DOCTYPE html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" href="data:," />
    <title>AI Company Simulator</title>
    <link rel="preload" href="/fonts/inter-var.woff2" as="font" type="font/woff2" crossorigin />
    <script>try{var t=localStorage['offisim.theme'];t=/^(light|dark|system)$/.test(t)?t:'system';document.documentElement.classList.toggle('dark',t=='dark'||t=='system'&&matchMedia('(prefers-color-scheme: dark)').matches)}catch(e){document.documentElement.classList.add('dark')}</script>
  </head>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
