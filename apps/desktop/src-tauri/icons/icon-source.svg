<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0c1929"/>
      <stop offset="100%" stop-color="#0e2a3f"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" rx="220" fill="url(#bg)"/>

  <!-- Subtle grid (office floor) -->
  <g opacity="0.06" stroke="#22d3ee" stroke-width="1" fill="none">
    <line x1="200" y1="0" x2="200" y2="1024"/>
    <line x1="400" y1="0" x2="400" y2="1024"/>
    <line x1="600" y1="0" x2="600" y2="1024"/>
    <line x1="824" y1="0" x2="824" y2="1024"/>
    <line x1="0" y1="200" x2="1024" y2="200"/>
    <line x1="0" y1="400" x2="1024" y2="400"/>
    <line x1="0" y1="600" x2="1024" y2="600"/>
    <line x1="0" y1="824" x2="1024" y2="824"/>
  </g>

  <!-- Building silhouette -->
  <g fill="none" stroke="url(#accent)" stroke-width="3" opacity="0.15">
    <rect x="320" y="280" width="384" height="500" rx="8"/>
    <rect x="370" y="330" width="80" height="60" rx="4"/>
    <rect x="470" y="330" width="80" height="60" rx="4"/>
    <rect x="570" y="330" width="80" height="60" rx="4"/>
    <rect x="370" y="420" width="80" height="60" rx="4"/>
    <rect x="470" y="420" width="80" height="60" rx="4"/>
    <rect x="570" y="420" width="80" height="60" rx="4"/>
    <rect x="370" y="510" width="80" height="60" rx="4"/>
    <rect x="470" y="510" width="80" height="60" rx="4"/>
    <rect x="570" y="510" width="80" height="60" rx="4"/>
  </g>

  <!-- Neural network nodes (AI agents) -->
  <g>
    <!-- Node connections -->
    <line x1="350" y1="380" x2="512" y2="300" stroke="#22d3ee" stroke-width="2.5" opacity="0.3"/>
    <line x1="674" y1="380" x2="512" y2="300" stroke="#22d3ee" stroke-width="2.5" opacity="0.3"/>
    <line x1="350" y1="380" x2="350" y2="540" stroke="#22d3ee" stroke-width="2.5" opacity="0.2"/>
    <line x1="674" y1="380" x2="674" y2="540" stroke="#22d3ee" stroke-width="2.5" opacity="0.2"/>
    <line x1="350" y1="540" x2="512" y2="640" stroke="#22d3ee" stroke-width="2.5" opacity="0.3"/>
    <line x1="674" y1="540" x2="512" y2="640" stroke="#22d3ee" stroke-width="2.5" opacity="0.3"/>
    <line x1="512" y1="300" x2="512" y2="640" stroke="#22d3ee" stroke-width="2" opacity="0.15"/>
    <line x1="350" y1="380" x2="674" y2="540" stroke="#8b5cf6" stroke-width="1.5" opacity="0.12"/>
    <line x1="674" y1="380" x2="350" y2="540" stroke="#8b5cf6" stroke-width="1.5" opacity="0.12"/>
  </g>

  <!-- Central "O" lettermark -->
  <g transform="translate(512, 470)">
    <circle r="155" fill="none" stroke="url(#glow)" stroke-width="36" opacity="0.9"/>
    <circle r="155" fill="none" stroke="#fff" stroke-width="28" opacity="0.08"/>
  </g>

  <!-- Agent dots on the ring -->
  <circle cx="512" cy="315" r="18" fill="#22d3ee"/>
  <circle cx="512" cy="315" r="10" fill="#0c1929"/>
  <circle cx="512" cy="625" r="18" fill="#22d3ee"/>
  <circle cx="512" cy="625" r="10" fill="#0c1929"/>
  <circle cx="357" cy="393" r="15" fill="#8b5cf6"/>
  <circle cx="357" cy="393" r="8" fill="#0c1929"/>
  <circle cx="667" cy="393" r="15" fill="#8b5cf6"/>
  <circle cx="667" cy="393" r="8" fill="#0c1929"/>
  <circle cx="357" cy="547" r="15" fill="#06b6d4"/>
  <circle cx="357" cy="547" r="8" fill="#0c1929"/>
  <circle cx="667" cy="547" r="15" fill="#06b6d4"/>
  <circle cx="667" cy="547" r="8" fill="#0c1929"/>

  <!-- "Offisim" text -->
  <text x="512" y="820" text-anchor="middle" font-family="-apple-system, BlinkMacSystemFont, 'Helvetica Neue', sans-serif" font-weight="600" font-size="80" fill="#ffffff" letter-spacing="8" opacity="0.85">OFFISIM</text>
</svg>
