[[permission]]
identifier = "fs-shell"
description = "Allow project-bound builtin filesystem and shell commands."
commands.allow = [
  "project_read_file",
  "project_preview_meta",
  "project_read_file_bytes",
  "project_list_dir",
  "reveal_local_path",
  "bash_execute",
  "terminal_session_create",
  "terminal_session_write",
  "terminal_session_resize",
  "terminal_session_snapshot",
  "terminal_session_list_scoped",
  "terminal_session_close",
  "browser_session_create",
  "browser_session_navigate",
  "browser_session_back",
  "browser_session_forward",
  "browser_session_reload",
  "browser_session_set_bounds",
  "browser_session_set_visible",
  "browser_session_snapshot",
  "browser_session_list_scoped",
  "browser_session_close",
  "attachment_write",
  "attachment_read",
  "attachment_list",
  "attachment_list_all",
  "attachment_delete",
  "attachment_delete_company",
  "secret_encrypt",
  "secret_decrypt",
  "export_computer_run_trace",
]
