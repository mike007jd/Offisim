[[permission]]
identifier = "fs-shell"
description = "Allow project-bound builtin filesystem and shell commands."
commands.allow = [
  "project_read_file",
  "project_read_file_lines",
  "project_read_file_preview",
  "project_preview_meta",
  "project_read_file_bytes",
  "project_exists",
  "project_list_dir",
  "project_write_file",
  "bash_execute",
  "attachment_write",
  "attachment_read",
  "attachment_list",
  "attachment_list_all",
  "attachment_delete",
  "attachment_delete_company",
  "secret_encrypt",
  "secret_decrypt",
  "export_computer_run_trace",
]
