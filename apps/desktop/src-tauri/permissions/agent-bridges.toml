[[permission]]
identifier = "agent-bridges"
description = "Allow trusted local agent, provider secret, runtime session, and MCP bridge commands."
commands.allow = [
  "runtime_secret_status",
  "runtime_secret_set",
  "runtime_secret_clear",
  "runtime_provider_profiles",
  "runtime_provider_profile_upsert",
  "runtime_provider_profile_save",
  "local_db_execute_transaction",
  "trusted_host_product_status",
  "claude_agent_execute",
  "claude_agent_abort",
  "codex_agent_execute",
  "codex_agent_abort",
  "llm_fetch",
  "llm_fetch_abort",
  "git_exec",
  "open_local_path",
  "ensure_company_workspace",
  "delete_company_workspace",
  "runtime_vault_status",
  "open_runtime_vault_folder",
  "runtime_vault_read_file",
  "runtime_vault_write_file",
  "runtime_vault_list_dir",
  "runtime_vault_stat",
  "runtime_vault_remove",
  "runtime_vault_mkdir",
  "export_runtime_vault_zip",
  "export_scene_drop_diagnostic",
  "save_deliverable_to_local",
  "get_session",
  "set_session_mode",
  "mcp_list_registered_servers",
  "mcp_register_server",
  "mcp_unregister_server",
  "mcp_connect_registered",
  "mcp_call_tool",
  "mcp_kill",
  "mcp_list_servers",
  "mcp_reconnect",
]
