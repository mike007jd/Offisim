services:
  platform:
    build:
      context: ..
      dockerfile: docker/platform.Dockerfile
    ports:
      - "4100:4100"
    environment:
      PORT: 4100
      DATABASE_URL: postgres://offisim:dev@postgres:5432/offisim
      CORS_ORIGINS: http://localhost:5176
      BETTER_AUTH_URL: http://localhost:4100
      BETTER_AUTH_SECRET: "${BETTER_AUTH_SECRET:?Set BETTER_AUTH_SECRET to at least 32 random characters}"
    depends_on:
      - postgres

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: offisim
      POSTGRES_USER: offisim
      POSTGRES_PASSWORD: dev
    ports:
      - "5432:5432"
    volumes:
      - ../packages/db-platform/schema.sql:/docker-entrypoint-initdb.d/001-offisim-platform-schema.sql:ro
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
