services:
  platform:
    build:
      context: ..
      dockerfile: docker/platform.Dockerfile
    ports:
      - "4100:4100"
    environment:
      PORT: 4100
      DATABASE_URL: postgres://offisim:dev@postgres:5432/offisim
      CORS_ORIGINS: http://localhost:5176
      BETTER_AUTH_URL: http://localhost:4100
      BETTER_AUTH_SECRET: change-me-for-real-use
    depends_on:
      - postgres

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: offisim
      POSTGRES_USER: offisim
      POSTGRES_PASSWORD: dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
